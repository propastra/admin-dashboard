  <style>
    #wa-float-btn {
      position: fixed;
      bottom: 90px;
      right: 20px;
      width: 52px;
      height: 52px;
      background: #25D366;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(37, 211, 102, 0.45);
      z-index: 99999;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      will-change: transform;
    }
    #wa-float-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 24px rgba(37, 211, 102, 0.6);
    }
    #wa-pulse {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: rgba(37, 211, 102, 0.4);
      animation: wa-pulse 2s ease-out infinite;
      pointer-events: none;
    }
    @keyframes wa-pulse {
      0%   { transform: scale(1); opacity: 0.7; }
      70%  { transform: scale(1.6); opacity: 0; }
      100% { transform: scale(1.6); opacity: 0; }
    }
  </style>

  <!-- SophiaAI Chatbot — deferred 2s after page load to not block render -->
  <script>
    window.addEventListener('load', function() {
      setTimeout(function() {
        var script = document.createElement('script');
        script.src = 'https://assets.sophiai.pro/chatbot-widgets/chatbot-widget-v2.js';
        script.setAttribute('data-chatbot-key', 'c4dee548-323f-4cad-8682-221fbc40ca9b');
        script.setAttribute('data-api-base', 'https://api.sophiai.pro/api');
        script.async = true;
        document.head.appendChild(script);
      }, 2000);
    });
  </script>
