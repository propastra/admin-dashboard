name: Deploy to EC2

on:
  push:
    branches:
      - main

# Cancel any in-progress deploy when a new push arrives
concurrency:
  group: deploy-to-ec2
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 12m
          script: |
            set -e

            BACKEND_DIR="/home/ubuntu/Admin_dashboard/backend"
            SAFE_UPLOADS="/home/ubuntu/persistent_data/uploads"
            SAFE_DB="/home/ubuntu/persistent_data/db_backups"

            # ============================================================
            # STEP 1: PROTECT DATA
            # ============================================================
            echo "=== [1/6] Protecting production data ==="
            mkdir -p "$SAFE_UPLOADS"
            mkdir -p "$SAFE_DB"
            rm -rf /home/ubuntu/deploy_tmp
            mkdir -p /home/ubuntu/deploy_tmp

            # Backup DB (quick file copy)
            if [ -f "$BACKEND_DIR/database.sqlite" ]; then
              TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
              cp "$BACKEND_DIR/database.sqlite" "$SAFE_DB/database_$TIMESTAMP.sqlite"
              # Keep only last 5 backups
              ls -t "$SAFE_DB/"*.sqlite 2>/dev/null | tail -n +6 | xargs rm -f 2>/dev/null || true
              # Move DB out before git reset
              mv "$BACKEND_DIR/database.sqlite" /home/ubuntu/deploy_tmp/database.sqlite
            fi

            # Move uploads out before git reset (fast move, not copy)
            if [ -d "$BACKEND_DIR/uploads" ]; then
              mv "$BACKEND_DIR/uploads" /home/ubuntu/deploy_tmp/uploads
            fi

            # Sync any new uploads to permanent store
            if [ -d "/home/ubuntu/deploy_tmp/uploads" ]; then
              rsync -a --ignore-existing /home/ubuntu/deploy_tmp/uploads/ "$SAFE_UPLOADS/" 2>/dev/null || true
            fi

            # ============================================================
            # STEP 2: PULL LATEST CODE
            # ============================================================
            echo "=== [2/6] Pulling latest code ==="
            cd /home/ubuntu/Admin_dashboard
            git fetch --all
            git reset --hard origin/main

            # ============================================================
            # STEP 3: RESTORE DATA
            # ============================================================
            echo "=== [3/6] Restoring production data ==="
            mkdir -p "$BACKEND_DIR/uploads"

            if [ -f /home/ubuntu/deploy_tmp/database.sqlite ]; then
              mv /home/ubuntu/deploy_tmp/database.sqlite "$BACKEND_DIR/database.sqlite"
            fi
            if [ -d "/home/ubuntu/deploy_tmp/uploads" ]; then
              rsync -a --ignore-existing /home/ubuntu/deploy_tmp/uploads/ "$BACKEND_DIR/uploads/"
            fi
            rm -rf /home/ubuntu/deploy_tmp

            # Merge from permanent store to catch any missed files
            rsync -a --ignore-existing "$SAFE_UPLOADS/" "$BACKEND_DIR/uploads/" 2>/dev/null || true

            echo "Uploads restored: $(ls "$BACKEND_DIR/uploads" 2>/dev/null | wc -l) files"

            # ============================================================
            # STEP 4: DEPLOY BACKEND
            # ============================================================
            echo "=== [4/6] Deploying Backend ==="
            cd "$BACKEND_DIR"

            # Always install to avoid stale node_modules issues
            echo "Installing backend dependencies..."
            npm install --prefer-offline 2>/dev/null || npm install

            npm run build

            # Migration (fast - skips if already applied)
            npm run migrate || true

            # Only seed if DB is empty
            PROP_COUNT=$(sqlite3 database.sqlite "SELECT COUNT(*) FROM Properties;" 2>/dev/null || echo "0")
            DEV_COUNT=$(sqlite3 database.sqlite "SELECT COUNT(*) FROM Developers;" 2>/dev/null || echo "0")
            echo "Properties: $PROP_COUNT | Developers: $DEV_COUNT"

            if [ "$PROP_COUNT" -eq 0 ] 2>/dev/null; then
              echo "Empty DB - running full seed..."
              node dist/seed.js || true
              npm run seed:all || true
            else
              echo "DB has data - skipping seed (preserving all $PROP_COUNT properties)"
            fi

            echo "Final: $(sqlite3 database.sqlite 'SELECT COUNT(*) FROM Properties;' 2>/dev/null || echo 'N/A') properties, $(ls uploads 2>/dev/null | wc -l) uploads"

            # Restart backend
            npx pm2 delete backend 2>/dev/null || true
            npx pm2 start npm --name "backend" -- run start
            npx pm2 save

            # ============================================================
            # STEP 5: DEPLOY FRONTEND (Admin Dashboard)
            # ============================================================
            echo "=== [5/6] Deploying Frontend ==="
            cd /home/ubuntu/Admin_dashboard/frontend

            sudo chown -R ubuntu:ubuntu dist 2>/dev/null || true
            rm -rf dist

            npm install --prefer-offline 2>/dev/null || npm install
            npm run build
            sudo chown -R www-data:www-data dist
            echo "Frontend deployed!"

            # ============================================================
            # STEP 6: DEPLOY WEBSITE (propastra.com)
            # ============================================================
            echo "=== [6/6] Deploying Website ==="
            cd /home/ubuntu/Admin_dashboard/website

            sudo chown -R ubuntu:ubuntu dist 2>/dev/null || true
            rm -rf dist

            npm install --prefer-offline 2>/dev/null || npm install
            npm run build
            sudo chown -R www-data:www-data dist
            echo "Website deployed!"

            # ============================================================
            # DONE
            # ============================================================
            echo ""
            echo "=== DEPLOYMENT COMPLETE ==="
            echo "Properties: $(sqlite3 /home/ubuntu/Admin_dashboard/backend/database.sqlite 'SELECT COUNT(*) FROM Properties;' 2>/dev/null || echo 'N/A')"
            echo "Uploads:    $(ls /home/ubuntu/Admin_dashboard/backend/uploads 2>/dev/null | wc -l) files"
            echo "Safe store: $(ls $SAFE_UPLOADS 2>/dev/null | wc -l) files backed up"
