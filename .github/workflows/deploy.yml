          script: |
            set -e
            # INVESTIGATION: List all files to find old backups/databases
            echo "Listing files in /home/ubuntu for recovery check..."
            ls -lh /home/ubuntu/
            find /home/ubuntu/Admin_dashboard -name "*.sqlite*" -ls || true
            
            # ----------------------------------------------------
            # 0. FREE UP DISK SPACE
            # ----------------------------------------------------
            echo "Cleaning up all old backups and temporary files..."
            rm -rf /home/ubuntu/Admin_dashboard_backup_*.tar.gz
            rm -rf /home/ubuntu/database_backup_*.tar.gz
            
            # Show disk space to debug
            df -h
            
            # Prune npm cache and logs to free up space before building
            npm cache clean --force || true
            npx pm2 flush || true
            sudo journalctl --vacuum-time=1d || true
            
                        # 1. CREATE A LEAN BACKUP (Only critical database)
            # ----------------------------------------------------
            echo "Creating a backup of the current database..."
            TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
            
            # Backup ONLY the database before we touch anything
            if [ -f "/home/ubuntu/Admin_dashboard/backend/database.sqlite" ]; then
              tar -czf /home/ubuntu/database_backup_$TIMESTAMP.tar.gz \
                  -C /home/ubuntu/Admin_dashboard/backend database.sqlite || [ $? -eq 1 ]
            fi

            # ----------------------------------------------------
            # 1. DATA SAFETY: PROTECT PRODUCTION DATABASE & UPLOADS
            # ----------------------------------------------------
            echo "Moving production database and uploads to temporary safe storage..."
            mkdir -p /home/ubuntu/prod_data_safe_tmp
            
            # Move the database and uploads out of the repo before git reset
            cp /home/ubuntu/Admin_dashboard/backend/database.sqlite /home/ubuntu/prod_data_safe_tmp/database.sqlite.bak || true
            mv /home/ubuntu/Admin_dashboard/backend/database.sqlite /home/ubuntu/prod_data_safe_tmp/database.sqlite || true
            
            # Since uploads can be large, we'll move the whole folder if it exists
            mv /home/ubuntu/Admin_dashboard/backend/uploads /home/ubuntu/prod_data_safe_tmp/uploads || true

            # ----------------------------------------------------
            # 2. PULL LATEST CODE
            # ----------------------------------------------------
            echo "Pulling latest code from GitHub..."
            cd /home/ubuntu/Admin_dashboard
            git fetch --all
            # This WILL remove database.sqlite and uploads/ from the working dir since they are now untracked/ignored
            git reset --hard origin/main
            
            # ----------------------------------------------------
            # 3. RESTORE PRODUCTION DATA
            # ----------------------------------------------------
            echo "Restoring production database and uploads..."
            mv /home/ubuntu/prod_data_safe_tmp/database.sqlite /home/ubuntu/Admin_dashboard/backend/database.sqlite || true
            mv /home/ubuntu/prod_data_safe_tmp/uploads /home/ubuntu/Admin_dashboard/backend/uploads || true
            rm -rf /home/ubuntu/prod_data_safe_tmp

            # ----------------------------------------------------
            # 2. DEPLOY BACKEND
            # ----------------------------------------------------
            echo "Deploying the Backend..."
            cd backend
            
            # Remove old node_modules and dist to save space before reinstalling
            rm -rf node_modules dist
            
            npm install
            npm run build
            
            # Reset production database (COMMENTED OUT TO PREVENT DATA LOSS)
            # echo "Resetting production database..."
            # rm -f database.sqlite
            # rm -f .seeded_*
            
            # Run migration and seeding BEFORE starting the backend
            echo "Running database migration (allowing NULLs)..."
            npm run migrate || true
            
            echo "Force seeding admin user..."
            node dist/seed.js || true
            
            # Force fresh seeding (COMMENTED OUT TO PREVENT DATA LOSS ON RE-DEPLOY)
            # echo "Force fresh seeding (249 properties)..."
            # sleep 2
            # npm run seed:all
            # echo "Fresh seeding complete!"
            
            # Verify total property count
            echo "Verifying property count..."
            sqlite3 database.sqlite "SELECT COUNT(*) FROM Properties;"
            
            # Start/Restart the backend
            npx pm2 delete backend || true
            npx pm2 start npm --name "backend" -- run start
            npx pm2 save

            # ----------------------------------------------------
            # 3. DEPLOY FRONTEND
            # ------------------------------------
            echo "Deploying the Frontend..."
            cd ../frontend
            
            sudo chown -R ubuntu:ubuntu /home/ubuntu/Admin_dashboard/frontend/dist || true
            
            # Remove old node_modules to save space
            rm -rf node_modules dist
            
            npm install
            npm run build
            
            # Create a public debug file to verify DB state
            echo "Creating debug file..."
            echo "Deployment Time: $(date)" > dist/debug.txt
            echo "DB Count: $(sqlite3 ../backend/database.sqlite "SELECT COUNT(*) FROM Properties;")" >> dist/debug.txt
            echo "DB Path Check: $(ls -l ../backend/database.sqlite)" >> dist/debug.txt
            echo "All DB Files: $(find /home/ubuntu/Admin_dashboard -name "database.sqlite")" >> dist/debug.txt
            
            sudo chown -R www-data:www-data /home/ubuntu/Admin_dashboard/frontend/dist
            
            echo "Deployment completed successfully!"
