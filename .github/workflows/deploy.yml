          command_timeout: 30m
          script: |
            set -e

            BACKEND_DIR="/home/ubuntu/Admin_dashboard/backend"
            SAFE_UPLOADS="/home/ubuntu/persistent_data/uploads"
            SAFE_DB="/home/ubuntu/persistent_data/db_backups"

            # ============================================================
            # STEP 1: PROTECT DATA (fast - just move files, no copy)
            # ============================================================
            echo "=== [1/6] Protecting production data ==="
            mkdir -p /home/ubuntu/persistent_data/uploads
            mkdir -p /home/ubuntu/persistent_data/db_backups
            rm -rf /home/ubuntu/deploy_tmp
            mkdir -p /home/ubuntu/deploy_tmp

            # Backup DB (quick file copy)
            if [ -f "$BACKEND_DIR/database.sqlite" ]; then
              TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
              cp "$BACKEND_DIR/database.sqlite" "$SAFE_DB/database_$TIMESTAMP.sqlite"
              # Keep only last 5 backups
              ls -t "$SAFE_DB/"*.sqlite 2>/dev/null | tail -n +6 | xargs rm -f || true
              # Move DB out before git reset
              mv "$BACKEND_DIR/database.sqlite" /home/ubuntu/deploy_tmp/database.sqlite
            fi

            # Move uploads out before git reset (fast move, not copy)
            if [ -d "$BACKEND_DIR/uploads" ]; then
              mv "$BACKEND_DIR/uploads" /home/ubuntu/deploy_tmp/uploads
            fi

            # Sync any new uploads to permanent store (only new files, skips existing)
            if [ -d "/home/ubuntu/deploy_tmp/uploads" ]; then
              rsync -a --ignore-existing /home/ubuntu/deploy_tmp/uploads/ "$SAFE_UPLOADS/" 2>/dev/null || true
            fi

            # ============================================================
            # STEP 2: PULL LATEST CODE
            # ============================================================
            echo "=== [2/6] Pulling latest code ==="
            cd /home/ubuntu/Admin_dashboard
            git fetch --all
            git reset --hard origin/main

            # ============================================================
            # STEP 3: RESTORE DATA
            # ============================================================
            echo "=== [3/6] Restoring production data ==="
            mkdir -p "$BACKEND_DIR/uploads"

            mv /home/ubuntu/deploy_tmp/database.sqlite "$BACKEND_DIR/database.sqlite" 2>/dev/null || true
            if [ -d "/home/ubuntu/deploy_tmp/uploads" ]; then
              rsync -a --ignore-existing /home/ubuntu/deploy_tmp/uploads/ "$BACKEND_DIR/uploads/"
              rm -rf /home/ubuntu/deploy_tmp
            fi
            # Merge from permanent store to catch any missed files
            rsync -a --ignore-existing "$SAFE_UPLOADS/" "$BACKEND_DIR/uploads/" 2>/dev/null || true

            echo "Uploads restored: $(ls $BACKEND_DIR/uploads | wc -l) files"

            # ============================================================
            # STEP 4: DEPLOY BACKEND
            # Only reinstall if package.json changed (saves ~1-2 min)
            # ============================================================
            echo "=== [4/6] Deploying Backend ==="
            cd "$BACKEND_DIR"

            # Smart install: reuse node_modules if lockfile unchanged
            LOCKFILE_CHANGED=false
            if [ ! -d "node_modules" ]; then
              LOCKFILE_CHANGED=true
            elif ! git diff HEAD~1 HEAD --name-only 2>/dev/null | grep -q "backend/package-lock.json"; then
              echo "package-lock.json unchanged - reusing node_modules"
            else
              LOCKFILE_CHANGED=true
            fi

            if [ "$LOCKFILE_CHANGED" = true ]; then
              echo "Installing backend dependencies..."
              rm -rf node_modules
              npm ci --prefer-offline 2>/dev/null || npm install
            fi

            npm run build

            # Migration (fast - skips if already applied)
            npm run migrate || true

            # Only seed if DB is empty (skip the slow logo-downloading seed otherwise)
            PROP_COUNT=$(sqlite3 database.sqlite "SELECT COUNT(*) FROM Properties;" 2>/dev/null || echo "0")
            DEV_COUNT=$(sqlite3 database.sqlite "SELECT COUNT(*) FROM Developers;" 2>/dev/null || echo "0")
            echo "Properties: $PROP_COUNT | Developers: $DEV_COUNT"

            if [ "$PROP_COUNT" -eq 0 ]; then
              echo "Empty DB - running full seed..."
              node dist/seed.js || true
              npm run seed:all || true
            else
              echo "DB has data - skipping seed (preserving all $PROP_COUNT properties)"
            fi

            echo "Final: $(sqlite3 database.sqlite 'SELECT COUNT(*) FROM Properties;') properties, $(ls uploads | wc -l) uploads"

            # Restart backend
            npx pm2 delete backend || true
            npx pm2 start npm --name "backend" -- run start
            npx pm2 save

            # ============================================================
            # STEP 5: DEPLOY FRONTEND (Admin Dashboard)
            # ============================================================
            echo "=== [5/6] Deploying Frontend ==="
            cd /home/ubuntu/Admin_dashboard/frontend

            sudo chown -R ubuntu:ubuntu dist 2>/dev/null || true
            rm -rf dist

            # Smart install
            if [ ! -d "node_modules" ] || git diff HEAD~1 HEAD --name-only 2>/dev/null | grep -q "frontend/package-lock.json"; then
              rm -rf node_modules
              npm ci --prefer-offline 2>/dev/null || npm install
            else
              echo "Reusing frontend node_modules"
            fi

            npm run build
            sudo chown -R www-data:www-data dist
            echo "Frontend deployed!"

            # ============================================================
            # STEP 6: DEPLOY WEBSITE (propastra.com)
            # ============================================================
            echo "=== [6/6] Deploying Website ==="
            cd /home/ubuntu/Admin_dashboard/website

            sudo chown -R ubuntu:ubuntu dist 2>/dev/null || true
            rm -rf dist

            # Smart install
            if [ ! -d "node_modules" ] || git diff HEAD~1 HEAD --name-only 2>/dev/null | grep -q "website/package-lock.json"; then
              rm -rf node_modules
              npm ci --prefer-offline 2>/dev/null || npm install
            else
              echo "Reusing website node_modules"
            fi

            npm run build
            sudo chown -R www-data:www-data dist
            echo "Website deployed!"

            # ============================================================
            # DONE
            # ============================================================
            echo ""
            echo "=== DEPLOYMENT COMPLETE ==="
            echo "Properties: $(sqlite3 /home/ubuntu/Admin_dashboard/backend/database.sqlite 'SELECT COUNT(*) FROM Properties;')"
            echo "Uploads:    $(ls /home/ubuntu/Admin_dashboard/backend/uploads | wc -l) files"
            echo "Safe store: $(ls $SAFE_UPLOADS | wc -l) files backed up"
