          script: |
            set -e
            # ----------------------------------------------------
            # SURGICAL INVESTIGATION: Audit the most promising backup
            # ----------------------------------------------------
            echo "--- START SURGICAL INVESTIGATION ---"
            PROM_BACKUP="/home/ubuntu/database_backup_20260308_220524.tar.gz"
            if [ -f "$PROM_BACKUP" ]; then
              echo "Inspecting PROMISING BACKUP: $PROM_BACKUP"
              mkdir -p /tmp/promising_inspect
              tar -xzf "$PROM_BACKUP" -C /tmp/promising_inspect/
              DB_FILE="/tmp/promising_inspect/database.sqlite"
              if [ -f "$DB_FILE" ]; then
                echo "Detailed Audit of Promising DB..."
                sqlite3 "$DB_FILE" "SELECT 'Total: ' || COUNT(*) FROM Properties;" || true
                sqlite3 "$DB_FILE" "SELECT 'Resale: ' || COUNT(*) FROM Properties WHERE category LIKE '%Resale%';" || true
                sqlite3 "$DB_FILE" "SELECT 'Residential: ' || COUNT(*) FROM Properties WHERE category LIKE '%Residential%';" || true
                sqlite3 "$DB_FILE" "SELECT 'With Brochure: ' || COUNT(*) FROM Properties WHERE brochure != '[]' AND brochure IS NOT NULL;" || true
                sqlite3 "$DB_FILE" "SELECT 'With Photos: ' || COUNT(*) FROM Properties WHERE photos != '[]' AND photos IS NOT NULL;" || true
                
                # Check for table snapshots
                sqlite3 "$DB_FILE" ".tables" || true
              fi
              # rm -rf /tmp/promising_inspect
            else
              echo "Promising backup $PROM_BACKUP not found."
            fi

            echo "Auditing uploads folder for specific missing types..."
            find /home/ubuntu/Admin_dashboard/backend/uploads -name "*.pdf" -printf "%T+ %p\n" | sort -r | head -n 20 || true
            find /home/ubuntu/Admin_dashboard/backend/uploads -name "*.jpeg" -o -name "*.png" -printf "%T+ %p\n" | sort -r | head -n 20 || true
            
            echo "--- END SURGICAL INVESTIGATION ---"

            # Ensure backend uploads directory exists
            mkdir -p backend/uploads

            # ----------------------------------------------------
            # 0. FREE UP DISK SPACE (Safer: No more deleting system backups)
            # ----------------------------------------------------
            echo "Cleaning up temporary files..."
            rm -rf /tmp/recovery_restoration
            rm -rf /tmp/recent_backup_inspect
            
            # Show disk space to debug
            df -h

            # Prune logs to free up space
            npx pm2 flush || true
            sudo journalctl --vacuum-time=1d || true
            
                        # 1. CREATE A LEAN BACKUP (Only critical database)
            # ----------------------------------------------------
            echo "Creating a backup of the current database..."
            TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
            
            # Backup ONLY the database before we touch anything
            if [ -f "/home/ubuntu/Admin_dashboard/backend/database.sqlite" ]; then
              tar -czf /home/ubuntu/database_backup_$TIMESTAMP.tar.gz \
                  -C /home/ubuntu/Admin_dashboard/backend database.sqlite || [ $? -eq 1 ]
            fi

            # ----------------------------------------------------
            # 1. DATA SAFETY: PROTECT PRODUCTION DATABASE & UPLOADS
            # ----------------------------------------------------
            echo "Moving production database and uploads to temporary safe storage..."
            mkdir -p /home/ubuntu/prod_data_safe_tmp
            
            # Move the database and uploads out of the repo before git reset
            cp /home/ubuntu/Admin_dashboard/backend/database.sqlite /home/ubuntu/prod_data_safe_tmp/database.sqlite.bak || true
            mv /home/ubuntu/Admin_dashboard/backend/database.sqlite /home/ubuntu/prod_data_safe_tmp/database.sqlite || true
            
            # Since uploads can be large, we'll move the whole folder if it exists
            mv /home/ubuntu/Admin_dashboard/backend/uploads /home/ubuntu/prod_data_safe_tmp/uploads || true

            # ----------------------------------------------------
            # 2. PULL LATEST CODE
            # ----------------------------------------------------
            echo "Pulling latest code from GitHub..."
            cd /home/ubuntu/Admin_dashboard
            git fetch --all
            # This WILL remove database.sqlite and uploads/ from the working dir since they are now untracked/ignored
            git reset --hard origin/main
            
            # ----------------------------------------------------
            # 3. RESTORE PRODUCTION DATA
            # ----------------------------------------------------
            echo "Restoring production database and uploads..."
            mv /home/ubuntu/prod_data_safe_tmp/database.sqlite /home/ubuntu/Admin_dashboard/backend/database.sqlite || true
            mv /home/ubuntu/prod_data_safe_tmp/uploads /home/ubuntu/Admin_dashboard/backend/uploads || true
            rm -rf /home/ubuntu/prod_data_safe_tmp

            # ----------------------------------------------------
            # 2. DEPLOY BACKEND
            # ----------------------------------------------------
            echo "Deploying the Backend..."
            cd backend
            
            # Remove old node_modules and dist to save space before reinstalling
            rm -rf node_modules dist
            
            npm install
            npm run build
            
            # Reset production database (COMMENTED OUT TO PREVENT DATA LOSS)
            # echo "Resetting production database..."
            # rm -f database.sqlite
            # rm -f .seeded_*
            
            # Run migration and seeding BEFORE starting the backend
            echo "Running database migration (allowing NULLs)..."
            npm run migrate || true
            
            echo "Force seeding admin user..."
            node dist/seed.js || true
            
            # Force fresh seeding (COMMENTED OUT TO PREVENT DATA LOSS ON RE-DEPLOY)
            # echo "Force fresh seeding (249 properties)..."
            # sleep 2
            # npm run seed:all
            # echo "Fresh seeding complete!"
            
            # Verify total property count and seed if empty
            echo "Verifying property count..."
            COUNT=$(sqlite3 database.sqlite "SELECT COUNT(*) FROM Properties;")
            echo "Current total properties: $COUNT"
            
            if [ "$COUNT" -eq 0 ]; then
              echo "Database is empty, running fresh seeding of 249 standard properties..."
              npm run seed:all
            fi
            
            # ----------------------------------------------------
            # 4. FINAL DATA RECOVERY (Restore manual properties & media)
            # ----------------------------------------------------
            if [ -f "backend_data_backup.zip" ]; then
              echo "Executing surgical restoration of manual properties from ZIP backup..."
              
              # Ensure unzip is installed
              if ! command -v unzip &> /dev/null; then
                echo "Installing unzip..."
                sudo apt-get update && sudo apt-get install -y unzip
              fi

              mkdir -p /tmp/recovery_restoration
              unzip -o backend_data_backup.zip "uploads/*" -d /tmp/recovery_restoration/
              unzip -o backend_data_backup.zip "database.sqlite" -d /tmp/recovery_restoration/
              
              # Sync missing files
              cp -vn /tmp/recovery_restoration/uploads/* uploads/ || true
              
              # Run surgical database merge/insert
              node src/restore_media.js /tmp/recovery_restoration/database.sqlite
              
              # Cleanup
              rm -rf /tmp/recovery_restoration
              echo "Data recovery completed!"
            fi
            
            # Do NOT run link_uploads_to_properties on deploy - it would clear/overwrite media. Keep all manual data (photos, brochures, properties) intact.

            # Verify finalized count
            echo "Final property count:"
            sqlite3 database.sqlite "SELECT COUNT(*) FROM Properties;"
            
            # Start/Restart the backend
            npx pm2 delete backend || true
            npx pm2 start npm --name "backend" -- run start
            npx pm2 save

            # ----------------------------------------------------
            # 3. DEPLOY FRONTEND
            # ------------------------------------
            echo "Deploying the Frontend..."
            cd ../frontend
            
            sudo chown -R ubuntu:ubuntu /home/ubuntu/Admin_dashboard/frontend/dist || true
            
            # Remove old node_modules to save space
            rm -rf node_modules dist
            
            npm install
            npm run build
            
            # Create a public debug file to verify DB state
            echo "Creating debug file..."
            echo "Deployment Time: $(date)" > dist/debug.txt
            echo "DB Count: $(sqlite3 ../backend/database.sqlite "SELECT COUNT(*) FROM Properties;")" >> dist/debug.txt
            echo "DB Path Check: $(ls -l ../backend/database.sqlite)" >> dist/debug.txt
            echo "All DB Files: $(find /home/ubuntu/Admin_dashboard -name "database.sqlite")" >> dist/debug.txt
            
            sudo chown -R www-data:www-data /home/ubuntu/Admin_dashboard/frontend/dist
            
            echo "Deployment completed successfully!"

            # ----------------------------------------------------
            # 5. DEPLOY WEBSITE (Customer-facing propastra.com)
            # ----------------------------------------------------
            echo "Deploying the Website (customer-facing)..."
            cd /home/ubuntu/Admin_dashboard/website
            
            sudo chown -R ubuntu:ubuntu /home/ubuntu/Admin_dashboard/website/dist || true
            
            # Remove old node_modules and dist
            rm -rf node_modules dist
            
            npm install
            npm run build
            
            sudo chown -R www-data:www-data /home/ubuntu/Admin_dashboard/website/dist
            
            echo "Website deployment completed successfully!"
